<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Q-ARunner -- Live Browser</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#040810}
body{display:flex;flex-direction:column;font-family:'JetBrains Mono',monospace}

/* ---- LIVE VIDEO LAYER ---- */
#video-wrap{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .3s;
}
#video-wrap.visible{opacity:1}
#live-img{
  width:100%;height:100%;
  object-fit:contain;
  display:block;
  /* no interpolation -- keep pixels crisp */
  image-rendering:-webkit-optimize-contrast;
  image-rendering:crisp-edges;
}

/* ---- IDLE OVERLAY ---- */
#idle{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  background:radial-gradient(ellipse 70% 55% at 50% 45%,rgba(0,180,255,.06) 0%,transparent 65%),#040810;
  transition:opacity .35s;z-index:10;
}
#idle.hidden{opacity:0;pointer-events:none}
.logo{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(0,200,255,.35)}
.ring{width:60px;height:60px;border-radius:50%;border:2.5px solid rgba(0,212,255,.12);
  border-top-color:rgba(0,212,255,.75);animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{font-size:12px;color:rgba(255,255,255,.2);text-align:center;line-height:2}
.hint{display:flex;align-items:center;gap:7px;padding:6px 16px;
  border:1px solid rgba(0,200,255,.12);border-radius:20px;
  background:rgba(0,200,255,.04);font-size:10px;color:rgba(0,200,255,.45);letter-spacing:.1em}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(0,200,255,.5);
  animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ---- HUD BADGE ---- */
#hud{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:7px;padding:5px 14px;
  background:rgba(4,8,16,.8);backdrop-filter:blur(12px);
  border:1px solid rgba(0,212,255,.2);border-radius:20px;
  font-size:9px;letter-spacing:.16em;text-transform:uppercase;
  color:rgba(0,212,255,.65);opacity:0;transition:opacity .3s;
  pointer-events:none;z-index:20;white-space:nowrap;
}
#hud.visible{opacity:1}
.hd{width:6px;height:6px;border-radius:50%;background:#00d4ff;
  box-shadow:0 0 8px rgba(0,212,255,.8);animation:blink .9s ease-in-out infinite}

/* ---- FRAME COUNTER ---- */
#fc{
  position:absolute;bottom:10px;left:12px;
  font-size:8px;color:rgba(0,212,255,.25);letter-spacing:.1em;
  pointer-events:none;z-index:20;opacity:0;transition:opacity .3s;
}
#fc.visible{opacity:1}
</style>
</head>
<body>

<!-- LIVE VIDEO: browser loads this as a continuous MJPEG stream -->
<div id="video-wrap">
  <img id="live-img" alt="live"/>
</div>

<!-- IDLE overlay shown before first frame -->
<div id="idle">
  <div class="logo">Q-ARunner -- Browser Preview</div>
  <div class="ring"></div>
  <div class="msg">Waiting for automation to start...<br/>Live video will appear when a run is active.</div>
  <div class="hint"><span class="dot"></span>Start a run from the dashboard</div>
</div>

<!-- HUD -->
<div id="hud"><span class="hd"></span><span id="hud-txt">LIVE</span></div>

<!-- Frame counter -->
<div id="fc"></div>

<script>
const idle    = document.getElementById('idle');
const wrap    = document.getElementById('video-wrap');
const liveImg = document.getElementById('live-img');
const hud     = document.getElementById('hud');
const hudTxt  = document.getElementById('hud-txt');
const fc      = document.getElementById('fc');
// fc is used as a frame-counter badge; update its text to show frame counts

let frames = 0;
let streamStarted = false;

function startStream() {
  if (streamStarted) return;
  streamStarted = true;

  // Point the img tag at the MJPEG stream endpoint.
  // The browser handles everything -- it keeps the connection open
  // and updates the image for every JPEG frame it receives.
  liveImg.src = '/video_feed';

  liveImg.onload = () => {
    // First frame received -- hide idle overlay, show video
    idle.classList.add('hidden');
    wrap.classList.add('visible');
    hud.classList.add('visible');
    frames++;
    fc.classList.add('visible');
    fc.textContent = 'FRAME ' + frames;
  };

  // Count frames via natural size changes (works in most browsers)
  // Fallback: poll /browser_status to update HUD text
}

// Poll /browser_status to know run state for HUD label
async function pollStatus() {
  try {
    const r = await fetch('/browser_status?_=' + Date.now());
    const d = await r.json();

    if (d.running || d.has_screenshot) {
      startStream();
      hudTxt.textContent = d.running
        ? ('LIVE -- RUN #' + (d.run_id || '--'))
        : ('LAST RUN -- ' + (d.run_id || '--'));
      hud.classList.add('visible');
    } else {
      // No active run, no screenshot yet -- keep idle
      if (!d.has_screenshot) {
        idle.classList.remove('hidden');
        wrap.classList.remove('visible');
      }
    }
  } catch(e) {}
}

// Start polling status immediately
pollStatus();
setInterval(pollStatus, 2000);

// Also attempt stream start right away in case run is already active
setTimeout(startStream, 500);
</script>
</body>
</html>
